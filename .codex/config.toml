[mcp_servers.pota]
command = "pota-mcp"

[mcp_servers.sota]
command = "sota-mcp"

[mcp_servers.solar]
command = "solar-mcp"

[mcp_servers.wspr]
command = "wspr-mcp"

[mcp_servers.qrz]
command = "qrz-mcp"

[mcp_servers.lotw]
command = "lotw-mcp"

[mcp_servers.fastmail]
url = "https://api.fastmail.com/mcp"
bearer_token_env_var = "FASTMAIL_MCP_API_TOKEN"

[mcp_servers.googleMaps]
command = "npx"
args = ["-y", "@cablate/mcp-google-map", "--stdio"]
env_vars = ["GOOGLE_MAPS_API_KEY"]
