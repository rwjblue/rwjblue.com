<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="680" viewBox="0 0 960 680" role="img" aria-labelledby="title description">
  <title id="title">Measured in-band SWR for the original and green 80/20 Reliance OCFD wires</title>
  <desc id="description">A dumbbell chart comparing the original wire with the green 80/20 replacement on 40, 20, 15, and 10 meters. The green wire improves the measured 40, 20, and 15 meter points while the original has the lower 10 meter SWR. The sessions used different coax and choke configurations.</desc>
  <style>
    .title { font: 800 31px Inter, ui-sans-serif, system-ui, sans-serif; fill: #172026; }
    .subtitle { font: 500 17px Inter, ui-sans-serif, system-ui, sans-serif; fill: #5f6f79; }
    .legend { font: 700 15px Inter, ui-sans-serif, system-ui, sans-serif; fill: #172026; }
    .tick, .frequency, .footnote { font: 700 13px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #5f6f79; }
    .band { font: 800 21px Inter, ui-sans-serif, system-ui, sans-serif; fill: #172026; }
    .value { font: 800 16px ui-monospace, SFMono-Regular, Menlo, monospace; }
    .original-value { fill: #5f6f79; }
    .green-value { fill: #2f6f4e; }
  </style>
  <rect width="960" height="680" rx="16" fill="#fffdfa" />
  <rect x="230" y="188" width="165" height="392" fill="#edf5f0" />
  <text x="44" y="52" class="title">Measured in-band SWR</text>
  <text x="44" y="81" class="subtitle">Historical original wire vs. first green 80/20 session</text>

  <circle cx="604" cy="53" r="8" fill="#5f6f79" />
  <text x="621" y="59" class="legend">Original wire</text>
  <polygon points="763,45 771,53 763,61 755,53" fill="#2f6f4e" />
  <text x="780" y="59" class="legend">Green 80/20</text>

  <text x="312.5" y="208" text-anchor="middle" class="frequency" fill="#2f6f4e">≤ 2:1 reference</text>
  
      <line x1="230" y1="188" x2="230" y2="580" stroke="#d9ded8" stroke-width="1" />
      <text x="230" y="172" text-anchor="middle" class="tick">1:1</text>
      <line x1="395" y1="188" x2="395" y2="580" stroke="#8ba79a" stroke-width="2" />
      <text x="395" y="172" text-anchor="middle" class="tick">2:1</text>
      <line x1="560" y1="188" x2="560" y2="580" stroke="#d9ded8" stroke-width="1" />
      <text x="560" y="172" text-anchor="middle" class="tick">3:1</text>
      <line x1="725" y1="188" x2="725" y2="580" stroke="#d9ded8" stroke-width="1" />
      <text x="725" y="172" text-anchor="middle" class="tick">4:1</text>
      <line x1="890" y1="188" x2="890" y2="580" stroke="#d9ded8" stroke-width="1" />
      <text x="890" y="172" text-anchor="middle" class="tick">5:1</text>
  
      <g>
        <text x="44" y="226" class="band">40 m</text>
        <text x="44" y="250" class="frequency">7.150 / 7.090 MHz</text>
        <line x1="659" y1="230" x2="774.5" y2="230" stroke="#aab4b8" stroke-width="4" stroke-linecap="round" />
        <circle cx="774.5" cy="230" r="9" fill="#5f6f79" />
        <text x="787.5" y="216" text-anchor="start" class="value original-value">4.3</text>
        <polygon points="659,221 668,230 659,239 650,230" fill="#2f6f4e" />
        <text x="672" y="259" text-anchor="start" class="value green-value">3.6</text>
      </g>
      <g>
        <text x="44" y="324" class="band">20 m</text>
        <text x="44" y="348" class="frequency">14.175 / 14.178 MHz</text>
        <line x1="309.2" y1="328" x2="444.5" y2="328" stroke="#aab4b8" stroke-width="4" stroke-linecap="round" />
        <circle cx="444.5" cy="328" r="9" fill="#5f6f79" />
        <text x="457.5" y="314" text-anchor="start" class="value original-value">2.3</text>
        <polygon points="309.2,319 318.2,328 309.2,337 300.2,328" fill="#2f6f4e" />
        <text x="322.2" y="357" text-anchor="start" class="value green-value">1.48</text>
      </g>
      <g>
        <text x="44" y="422" class="band">15 m</text>
        <text x="44" y="446" class="frequency">21.225 MHz</text>
        <line x1="314.15" y1="426" x2="708.5" y2="426" stroke="#aab4b8" stroke-width="4" stroke-linecap="round" />
        <circle cx="708.5" cy="426" r="9" fill="#5f6f79" />
        <text x="721.5" y="412" text-anchor="start" class="value original-value">3.9</text>
        <polygon points="314.15,417 323.15,426 314.15,435 305.15,426" fill="#2f6f4e" />
        <text x="327.15" y="455" text-anchor="start" class="value green-value">1.51</text>
      </g>
      <g>
        <text x="44" y="520" class="band">10 m</text>
        <text x="44" y="544" class="frequency">28.850 MHz</text>
        <line x1="291.05" y1="524" x2="477.5" y2="524" stroke="#aab4b8" stroke-width="4" stroke-linecap="round" />
        <circle cx="291.05" cy="524" r="9" fill="#5f6f79" />
        <text x="304.05" y="510" text-anchor="start" class="value original-value">1.37</text>
        <polygon points="477.5,515 486.5,524 477.5,533 468.5,524" fill="#2f6f4e" />
        <text x="490.5" y="553" text-anchor="start" class="value green-value">2.5</text>
      </g>

  <line x1="44" y1="620" x2="916" y2="620" stroke="#d9ded8" />
  <text x="44" y="647" class="footnote">Different-day setups: original used RG-316; green used RG-174 plus five ferrite beads.</text>
</svg>
