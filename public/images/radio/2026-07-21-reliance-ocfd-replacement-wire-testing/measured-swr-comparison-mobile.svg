<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="390" height="760" viewBox="0 0 390 760" role="img" aria-labelledby="mobile-title mobile-description">
  <title id="mobile-title">Measured in-band SWR for the original and green 80/20 Reliance OCFD wires</title>
  <desc id="mobile-description">A dumbbell chart comparing the original wire with the green 80/20 replacement on 40, 20, 15, and 10 meters. The green wire improves the measured 40, 20, and 15 meter points while the original has the lower 10 meter SWR. The sessions used different coax and choke configurations.</desc>
  <style>
    .title { font: 800 25px Inter, ui-sans-serif, system-ui, sans-serif; fill: #172026; }
    .subtitle { font: 500 14px Inter, ui-sans-serif, system-ui, sans-serif; fill: #5f6f79; }
    .legend { font: 700 13px Inter, ui-sans-serif, system-ui, sans-serif; fill: #172026; }
    .tick, .frequency, .footnote { font: 700 10px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #5f6f79; }
    .band { font: 800 18px Inter, ui-sans-serif, system-ui, sans-serif; fill: #172026; }
    .value { font: 800 13px ui-monospace, SFMono-Regular, Menlo, monospace; }
    .original-value { fill: #5f6f79; }
    .green-value { fill: #2f6f4e; }
  </style>
  <rect width="390" height="760" rx="12" fill="#fffdfa" />
  <rect x="98" y="170" width="68" height="480" fill="#edf5f0" />
  <text x="18" y="38" class="title">Measured in-band SWR</text>
  <text x="18" y="64" class="subtitle">Original wire vs. first green 80/20 session</text>

  <circle cx="27" cy="103" r="7" fill="#5f6f79" />
  <text x="42" y="108" class="legend">Original wire</text>
  <polygon points="200,96 207,103 200,110 193,103" fill="#2f6f4e" />
  <text x="215" y="108" class="legend">Green 80/20</text>

  <text x="132" y="188" text-anchor="middle" class="frequency" fill="#2f6f4e">≤ 2:1</text>
  
      <line x1="98" y1="170" x2="98" y2="650" stroke="#d9ded8" stroke-width="1" />
      <text x="98" y="157" text-anchor="middle" class="tick">1:1</text>
      <line x1="166" y1="170" x2="166" y2="650" stroke="#8ba79a" stroke-width="2" />
      <text x="166" y="157" text-anchor="middle" class="tick">2:1</text>
      <line x1="234" y1="170" x2="234" y2="650" stroke="#d9ded8" stroke-width="1" />
      <text x="234" y="157" text-anchor="middle" class="tick">3:1</text>
      <line x1="302" y1="170" x2="302" y2="650" stroke="#d9ded8" stroke-width="1" />
      <text x="302" y="157" text-anchor="middle" class="tick">4:1</text>
      <line x1="370" y1="170" x2="370" y2="650" stroke="#d9ded8" stroke-width="1" />
      <text x="370" y="157" text-anchor="middle" class="tick">5:1</text>
  
      <g>
        <text x="18" y="228" class="band">40 m</text>
        <text x="18" y="250" class="frequency">7.150 / 7.090</text>
        <line x1="274.8" y1="232" x2="322.4" y2="232" stroke="#aab4b8" stroke-width="4" stroke-linecap="round" />
        <circle cx="322.4" cy="232" r="8" fill="#5f6f79" />
        <text x="322.4" y="217" text-anchor="middle" class="value original-value">4.3</text>
        <polygon points="274.8,224 282.8,232 274.8,240 266.8,232" fill="#2f6f4e" />
        <text x="274.8" y="260" text-anchor="middle" class="value green-value">3.6</text>
      </g>
      <g>
        <text x="18" y="344" class="band">20 m</text>
        <text x="18" y="366" class="frequency">14.175 / 14.178</text>
        <line x1="130.64" y1="348" x2="186.4" y2="348" stroke="#aab4b8" stroke-width="4" stroke-linecap="round" />
        <circle cx="186.4" cy="348" r="8" fill="#5f6f79" />
        <text x="186.4" y="333" text-anchor="middle" class="value original-value">2.3</text>
        <polygon points="130.64,340 138.64,348 130.64,356 122.63999999999999,348" fill="#2f6f4e" />
        <text x="130.64" y="376" text-anchor="middle" class="value green-value">1.48</text>
      </g>
      <g>
        <text x="18" y="460" class="band">15 m</text>
        <text x="18" y="482" class="frequency">21.225</text>
        <line x1="132.68" y1="464" x2="295.2" y2="464" stroke="#aab4b8" stroke-width="4" stroke-linecap="round" />
        <circle cx="295.2" cy="464" r="8" fill="#5f6f79" />
        <text x="295.2" y="449" text-anchor="middle" class="value original-value">3.9</text>
        <polygon points="132.68,456 140.68,464 132.68,472 124.68,464" fill="#2f6f4e" />
        <text x="132.68" y="492" text-anchor="middle" class="value green-value">1.51</text>
      </g>
      <g>
        <text x="18" y="576" class="band">10 m</text>
        <text x="18" y="598" class="frequency">28.850</text>
        <line x1="123.16" y1="580" x2="200" y2="580" stroke="#aab4b8" stroke-width="4" stroke-linecap="round" />
        <circle cx="123.16" cy="580" r="8" fill="#5f6f79" />
        <text x="123.16" y="565" text-anchor="middle" class="value original-value">1.37</text>
        <polygon points="200,572 208,580 200,588 192,580" fill="#2f6f4e" />
        <text x="200" y="608" text-anchor="middle" class="value green-value">2.5</text>
      </g>

  <line x1="18" y1="690" x2="372" y2="690" stroke="#d9ded8" />
  <text x="18" y="716" class="footnote">Different-day setups: original used RG-316;</text>
  <text x="18" y="735" class="footnote">green used RG-174 plus five ferrite beads.</text>
</svg>
